name: Reply Bot

on:
  schedule:
    # Runs every 3 hours between 08:00 and 22:00 UTC+3 (05:00–19:00 UTC)
    - cron: "0 5 * * *"    # 08:00 UTC+3
    - cron: "0 8 * * *"    # 11:00 UTC+3
    - cron: "0 11 * * *"   # 14:00 UTC+3
    - cron: "0 14 * * *"   # 17:00 UTC+3
    - cron: "0 17 * * *"   # 20:00 UTC+3
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  reply:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit log/state files back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Reply Bot
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd src
          python reply_bot.py

      - name: Commit updated state files
        run: |
          git config --local user.email "bot@review-app.com"
          git config --local user.name "Review Bot"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update bot state [skip ci]"
          git push
